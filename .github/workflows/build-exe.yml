name: Build CURAM Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unzip CURAM EXE source
        shell: powershell
        run: |
          Remove-Item -Recurse -Force curam_pc_app -ErrorAction SilentlyContinue
          Expand-Archive -Path curam_exe_source.zip -DestinationPath curam_pc_app -Force

          $pkg = Get-ChildItem -Path curam_pc_app -Filter package.json -Recurse | Select-Object -First 1
          if ($null -eq $pkg) {
            Write-Error "package.json not found inside curam_exe_source.zip"
            exit 1
          }

          $root = Resolve-Path curam_pc_app
          if ($pkg.Directory.FullName -ne $root.Path) {
            Copy-Item -Path "$($pkg.Directory.FullName)\*" -Destination curam_pc_app -Recurse -Force
          }

          Get-ChildItem curam_pc_app

      - name: Install dependencies
        working-directory: curam_pc_app
        run: npm install

      - name: Apply CURAM CE Windows icon
        working-directory: curam_pc_app
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null

          if (Test-Path "..\icon.ico") {
            Copy-Item "..\icon.ico" "build\icon.ico" -Force
            Write-Host "CURAM CE icon copied to build\icon.ico"
          } else {
            Write-Error "icon.ico not found in repository root. Please upload icon.ico beside curam_exe_source.zip"
            exit 1
          }

          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.author=p.author||'CURAM EARTHWORKING INC GUTALAC'; p.build=p.build||{}; p.build.icon='build/icon.ico'; p.build.win=p.build.win||{}; p.build.win.icon='build/icon.ico'; p.build.nsis=p.build.nsis||{}; p.build.nsis.installerIcon='build/icon.ico'; p.build.nsis.uninstallerIcon='build/icon.ico'; fs.writeFileSync('package.json', JSON.stringify(p,null,2));"

          Get-ChildItem build
          type package.json

      - name: Build Windows EXE
        working-directory: curam_pc_app
        run: npm run dist

      - name: Upload EXE files
        uses: actions/upload-artifact@v4
        with:
          name: CURAM-GUTALAC-Windows-EXE
          path: |
            curam_pc_app/dist/*.exe
            curam_pc_app/dist/*.zip
            curam_pc_app/dist/*.blockmap
