name: Build CURAM Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract CURAM EXE source
        shell: powershell
        run: |
          if (Test-Path "curam_exe_app") {
            Remove-Item -Recurse -Force "curam_exe_app"
          }
          Expand-Archive -Path "curam_exe_source.zip" -DestinationPath "curam_exe_app" -Force
          Get-ChildItem "curam_exe_app"

      - name: Install dependencies
        working-directory: curam_exe_app
        run: npm install

      - name: Build Windows EXE
        working-directory: curam_exe_app
        run: npm run dist

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: CURAM-GUTALAC-V32-SYNC-ONLY-PC-NAV-FIX-EXE
          path: |
            curam_exe_app/dist/*.exe
            curam_exe_app/dist/*.msi
            curam_exe_app/dist/*.zip
